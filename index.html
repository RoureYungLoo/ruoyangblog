<!DOCTYPE html>
<html lang="zh-Hans-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        .round {
            width: auto;
            height: auto;
            border-radius: 0.25em;
            overflow: hidden;
            padding-left: 5px;
            padding-right: 5px;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 3000% 3000%;
            animation: gradientBG 90s linear infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }

        }

        .start:link,
        .start:hover {
            text-decoration: none;
            background-color: lightgray;
            color: white;
        }

        .start:visited,
        .start:hover {
            text-decoration: none;
            background-color: lightgray;
            color: white;
        }

        .start:active {
            text-decoration: none;
            background-color: lightgray;
            color:whitesmoke;
        }

        a{
            margin-right: 2px;
        }
        
    </style>
</head>

<body>
    <h2>Welcome to ruoyang's blog.</h2>
    <p>Click to <a href="./navigator.html" class="start round" target="_self">start</a>.</p>
</body>
</html>
